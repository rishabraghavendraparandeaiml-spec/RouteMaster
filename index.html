fastes<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteMaster AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Manrope', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        body.light {
            background: linear-gradient(120deg, #f4f7ff 0%, #f9f4ff 45%, #eef9f7 100%);
            color: #1e293b;
        }
        body.dark {
            background: linear-gradient(120deg, #0f172a 0%, #1e1b4b 45%, #064e3b 100%);
            color: #e2e8f0;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MODES = {
            OBSTACLE: 'obstacle',
            START: 'start',
            TARGET: 'target',
            ERASE: 'erase'
        };

        const CELL_SIZE = 52;
        const CELL_GAP = 8;

        function App() {
            const [rows, setRows] = useState(6);
            const [cols, setCols] = useState(8);
            const [gridSizeInput, setGridSizeInput] = useState('[6, 8]');
            const [grid, setGrid] = useState(Array.from({ length: 6 }, () => Array(8).fill(0)));
            const [start, setStart] = useState([0, 0]);
            const [startInput, setStartInput] = useState('[0, 0]');
            const [targetsInput, setTargetsInput] = useState('[[2, 1]]');
            const [showStartInput, setShowStartInput] = useState(false);
            const [showTargetInput, setShowTargetInput] = useState(false);
            const [mode, setMode] = useState(MODES.OBSTACLE);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [path, setPath] = useState([]);
            const [stats, setStats] = useState(null);
            const [comparison, setComparison] = useState([]);
            const [accuracy, setAccuracy] = useState(null);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [animatedIndex, setAnimatedIndex] = useState(-1);
            const animationRef = useRef(null);

            const clearAnimation = () => {
                if (animationRef.current) {
                    clearInterval(animationRef.current);
                    animationRef.current = null;
                }
            };

            useEffect(() => {
                return () => clearAnimation();
            }, []);

            useEffect(() => {
                document.body.className = isDarkMode ? 'dark antialiased' : 'light antialiased';
            }, [isDarkMode]);

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            const isStart = (r, c) => start[0] === r && start[1] === c;
            const isTarget = (r, c) => grid[r] && grid[r][c] === 2;
            
            // Extract targets from grid (cells marked with 2)
            const getTargets = () => {
                const targets = [];
                for (let r = 0; r < grid.length; r++) {
                    for (let c = 0; c < grid[r].length; c++) {
                        if (grid[r][c] === 2) {
                            targets.push([r, c]);
                        }
                    }
                }
                return targets;
            };



            const createGrid = () => {
                setError('');
                try {
                    const parsedSize = JSON.parse(gridSizeInput);
                    if (!Array.isArray(parsedSize) || parsedSize.length !== 2) {
                        throw new Error('Grid size must be [rows, cols]');
                    }
                    const [inputRows, inputCols] = parsedSize;
                    const nextRows = Math.max(1, Math.min(20, Number(inputRows)));
                    const nextCols = Math.max(1, Math.min(20, Number(inputCols)));
                    
                    setRows(nextRows);
                    setCols(nextCols);
                    setGridSizeInput(`[${nextRows}, ${nextCols}]`);
                    setGrid(Array.from({ length: nextRows }, () => Array(nextCols).fill(0)));
                    setStart([0, 0]);
                    clearAnimation();
                    setAnimatedIndex(-1);
                    setPath([]);
                    setStats(null);
                    setComparison([]);
                } catch (e) {
                    setError(`Invalid grid size: ${e.message}`);
                }
            };

            const applyCellAction = (r, c) => {
                setError('');
                clearAnimation();
                setAnimatedIndex(-1);
                setPath([]);

                if (mode === MODES.START) {
                    if (grid[r][c] === 1) return;
                    setStart([r, c]);
                    return;
                }

                if (mode === MODES.TARGET) {
                    if (grid[r][c] === 1 || isStart(r, c)) return;
                    setGrid((prevGrid) => {
                        const nextGrid = prevGrid.map((row) => [...row]);
                        if (isTarget(r, c)) {
                            nextGrid[r][c] = 0; // Remove target
                        } else {
                            nextGrid[r][c] = 2; // Set target
                        }
                        return nextGrid;
                    });
                    return;
                }

                setGrid((prevGrid) => {
                    const nextGrid = prevGrid.map((row) => [...row]);

                    if (mode === MODES.OBSTACLE) {
                        if (isStart(r, c)) return nextGrid;
                        nextGrid[r][c] = 1;
                    }

                    if (mode === MODES.ERASE) {
                        nextGrid[r][c] = 0;
                    }

                    return nextGrid;
                });
            };

            const resetBoard = () => {
                setGrid(Array.from({ length: rows }, () => Array(cols).fill(0)));
                setStart([0, 0]);
                setStartInput('[0, 0]');
                setTargetsInput('[]');
                setShowStartInput(false);
                setShowTargetInput(false);
                clearAnimation();
                setAnimatedIndex(-1);
                setPath([]);
                setStats(null);
                setComparison([]);
                setError('');
            };

            const applyStartInput = () => {
                setError('');
                try {
                    const parsedStart = JSON.parse(startInput);
                    if (!Array.isArray(parsedStart) || parsedStart.length !== 2) {
                        throw new Error('Start must be [row, col]');
                    }
                    const [r, c] = parsedStart;
                    if (r < 0 || r >= rows || c < 0 || c >= cols) {
                        throw new Error(`Start [${r}, ${c}] is out of bounds`);
                    }
                    if (grid[r][c] === 1) {
                        throw new Error('Start cannot be on an obstacle');
                    }
                    setStart(parsedStart);
                    setShowStartInput(false);
                    setError('');
                } catch (e) {
                    setError(`Invalid start: ${e.message}`);
                }
            };

            const applyTargetInput = () => {
                setError('');
                try {
                    const parsedTargets = JSON.parse(targetsInput);
                    if (!Array.isArray(parsedTargets)) {
                        throw new Error('Targets must be an array like [[r,c], [r,c]]');
                    }
                    
                    // Clear existing targets from grid
                    const newGrid = grid.map(row => row.map(cell => cell === 2 ? 0 : cell));
                    
                    // Apply targets to grid
                    for (const target of parsedTargets) {
                        if (!Array.isArray(target) || target.length !== 2) {
                            throw new Error('Each target must be [row, col]');
                        }
                        const [tr, tc] = target;
                        if (tr < 0 || tr >= rows || tc < 0 || tc >= cols) {
                            throw new Error(`Target [${tr}, ${tc}] is out of bounds`);
                        }
                        if (newGrid[tr][tc] === 1) {
                            throw new Error(`Target [${tr}, ${tc}] is on an obstacle`);
                        }
                        newGrid[tr][tc] = 2;
                    }
                    
                    setGrid(newGrid);
                    setShowTargetInput(false);
                    setError('');
                } catch (e) {
                    setError(`Invalid targets: ${e.message}`);
                }
            };

            const buildPayload = () => ({ grid, start, targets: getTargets() });

            const runOptimization = async () => {
                setError('');
                setStats(null);
                setComparison([]);
                clearAnimation();
                setAnimatedIndex(-1);

                const targets = getTargets();
                if (!targets.length) {
                    setError('Please add at least one target.');
                    return;
                }

                setPath([]);
                setLoading(true);

                try {
                    // Use /route endpoint with exact JSON structure
                    const res = await fetch('/route', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ grid, start, targets })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Failed to calculate route');
                    }

                    // Store response: {total_steps, path, target_reached, execution_time_ms}
                    setStats(data);
                    const fullPath = data.path || [];
                    setPath(fullPath);
                    if (!fullPath.length) {
                        return;
                    }

                    setAnimatedIndex(0);
                    let step = 0;
                    animationRef.current = setInterval(() => {
                        step += 1;
                        if (step >= fullPath.length) {
                            setAnimatedIndex(fullPath.length - 1);
                            clearAnimation();
                            return;
                        }
                        setAnimatedIndex(step);
                    }, 180);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const runComparison = async () => {
                setError('');
                setComparison([]);
                clearAnimation();
                setAnimatedIndex(-1);

                const targets = getTargets();
                if (!targets.length) {
                    setError('Please add at least one target before comparing algorithms.');
                    return;
                }

                setLoading(true);
                try {
                    const res = await fetch('/compare-algorithms', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(buildPayload())
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Comparison failed');
                    }

                    setComparison(data.results || []);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const verifyAccuracy = async () => {
                setError('');
                setAccuracy(null);

                const targets = getTargets();
                if (!targets.length) {
                    setError('Please add at least one target before verifying accuracy.');
                    return;
                }

                setLoading(true);
                try {
                    const res = await fetch('/verify-accuracy', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(buildPayload())
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Accuracy verification failed');
                    }

                    setAccuracy(data);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const modeButtonClass = (currentMode) =>
                `px-3 py-2 rounded-xl font-semibold text-sm transition ${mode === currentMode ? 'bg-indigo-500 text-white shadow' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100'}`;

            const animatedPath = animatedIndex >= 0 ? path.slice(0, animatedIndex + 1) : [];
            const activePoint = animatedPath.length ? animatedPath[animatedPath.length - 1] : null;
            const routePoints = animatedPath.map(([r, c]) => {
                const x = c * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2;
                const y = r * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2;
                return `${x},${y}`;
            }).join(' ');
            const pathIndexMap = new Map(animatedPath.map((point, index) => [`${point[0]}-${point[1]}`, index + 1]));
            const gridPixelWidth = cols * CELL_SIZE + (cols - 1) * CELL_GAP;
            const gridPixelHeight = rows * CELL_SIZE + (rows - 1) * CELL_GAP;

            return (
                <div className={`p-6 max-w-7xl mx-auto ${isDarkMode ? 'text-slate-200' : 'text-slate-800'}`}>
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex-1">
                            <h1 className={`text-4xl font-extrabold mb-2 text-center ${isDarkMode ? 'text-indigo-400' : 'text-indigo-700'}`}>RouteMaster AI - Smart Warehouse Routing</h1>
                            <p className={`mb-6 text-center ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>Build a custom warehouse map, optimize routes, and compare algorithms live.</p>
                        </div>
                        <button 
                            onClick={toggleTheme}
                            className={`ml-4 p-3 rounded-full transition shadow-lg ${isDarkMode ? 'bg-yellow-400 hover:bg-yellow-300' : 'bg-slate-700 hover:bg-slate-600'}`}
                            title={isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                        >
                            {isDarkMode ? '☀️' : '🌙'}
                        </button>
                    </div>

                    <div className="grid lg:grid-cols-3 gap-6 items-start">
                        <div className={`backdrop-blur p-5 rounded-2xl border shadow-sm ${isDarkMode ? 'bg-slate-800/80 border-slate-700' : 'bg-white/80 border-indigo-100'}`}>
                            <h2 className={`text-lg font-bold mb-3 ${isDarkMode ? 'text-indigo-400' : 'text-indigo-700'}`}>1) Build Scenario</h2>
                            <p className={`text-sm mb-3 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Choose a tool and click on cells to design your warehouse map.</p>

                            <div className="mb-3">
                                <label className={`text-sm ${isDarkMode ? 'text-slate-300' : 'text-slate-600'}`}>Grid Size [rows, cols]</label>
                                <input 
                                    type="text" 
                                    value={gridSizeInput} 
                                    onChange={(e) => setGridSizeInput(e.target.value)}
                                    placeholder="[6, 8]"
                                    className={`w-full p-2 rounded-xl border focus:outline-none focus:ring-2 ${isDarkMode ? 'bg-slate-700 border-slate-600 text-white focus:ring-indigo-500' : 'bg-white border-indigo-200 focus:ring-indigo-200'}`}
                                />
                            </div>

                            <button onClick={createGrid} className={`w-full mb-3 px-3 py-2 rounded-xl font-semibold transition ${isDarkMode ? 'bg-indigo-600 text-white hover:bg-indigo-500' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200'}`}>Create New Grid</button>

                            <div className="grid grid-cols-2 gap-2 mb-3">
                                <button onClick={() => setMode(MODES.OBSTACLE)} className={modeButtonClass(MODES.OBSTACLE)}>Obstacle</button>
                                <button onClick={() => setMode(MODES.ERASE)} className={modeButtonClass(MODES.ERASE)}>Erase</button>
                                <button onClick={() => { setShowStartInput(!showStartInput); setShowTargetInput(false); }} className={`px-3 py-2 rounded-xl font-semibold text-sm transition ${showStartInput ? 'bg-emerald-500 text-white shadow' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100'}`}>Set Start</button>
                                <button onClick={() => { setShowTargetInput(!showTargetInput); setShowStartInput(false); }} className={`px-3 py-2 rounded-xl font-semibold text-sm transition ${showTargetInput ? 'bg-amber-500 text-white shadow' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100'}`}>Set Target</button>
                            </div>

                            {showStartInput && (
                                <div className={`mb-3 p-3 rounded-xl border ${isDarkMode ? 'bg-emerald-900/50 border-emerald-700' : 'bg-emerald-50 border-emerald-200'}`}>
                                    <label className={`text-xs font-semibold mb-1 block ${isDarkMode ? 'text-emerald-300' : 'text-emerald-900'}`}>Enter Start [row, col]</label>
                                    <input 
                                        type="text" 
                                        value={startInput} 
                                        onChange={(e) => setStartInput(e.target.value)}
                                        placeholder="[0, 0]"
                                        className={`w-full p-2 text-sm rounded-lg border focus:outline-none focus:ring-2 mb-2 ${isDarkMode ? 'bg-slate-700 border-emerald-600 text-white focus:ring-emerald-500' : 'bg-white border-emerald-300 focus:ring-emerald-400'}`}
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={applyStartInput} className={`flex-1 px-3 py-2 rounded-lg font-semibold text-sm transition ${isDarkMode ? 'bg-emerald-600 text-white hover:bg-emerald-500' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`}>Apply</button>
                                        <button onClick={() => setShowStartInput(false)} className={`px-3 py-2 rounded-lg font-semibold text-sm transition ${isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Cancel</button>
                                    </div>
                                </div>
                            )}

                            {showTargetInput && (
                                <div className={`mb-3 p-3 rounded-xl border ${isDarkMode ? 'bg-amber-900/50 border-amber-700' : 'bg-amber-50 border-amber-200'}`}>
                                    <label className={`text-xs font-semibold mb-1 block ${isDarkMode ? 'text-amber-300' : 'text-amber-900'}`}>Enter Targets [[row, col], ...]</label>
                                    <input 
                                        type="text" 
                                        value={targetsInput} 
                                        onChange={(e) => setTargetsInput(e.target.value)}
                                        placeholder="[[2, 1], [3, 4]]"
                                        className={`w-full p-2 text-sm rounded-lg border focus:outline-none focus:ring-2 mb-2 ${isDarkMode ? 'bg-slate-700 border-amber-600 text-white focus:ring-amber-500' : 'bg-white border-amber-300 focus:ring-amber-400'}`}
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={applyTargetInput} className={`flex-1 px-3 py-2 rounded-lg font-semibold text-sm transition ${isDarkMode ? 'bg-amber-600 text-white hover:bg-amber-500' : 'bg-amber-600 text-white hover:bg-amber-700'}`}>Apply</button>
                                        <button onClick={() => setShowTargetInput(false)} className={`px-3 py-2 rounded-lg font-semibold text-sm transition ${isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Cancel</button>
                                    </div>
                                </div>
                            )}

                            <button onClick={resetBoard} className={`w-full mb-2 px-3 py-2 rounded-xl font-semibold transition ${isDarkMode ? 'bg-rose-900 text-rose-300 hover:bg-rose-800' : 'bg-rose-100 text-rose-700 hover:bg-rose-200'}`}>Reset Board</button>

                            <div className={`text-sm mt-3 space-y-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                <p>Start: [{start[0]}, {start[1]}] (0-indexed)</p>
                                <p>Targets: {getTargets().length}</p>
                                <p>Obstacles: {grid.flat().filter((v) => v === 1).length}</p>
                                <p className="text-xs mt-1 italic">Grid: {rows} rows × {cols} cols (matrix format)</p>
                            </div>

                            <div className={`mt-4 p-3 rounded-xl border text-xs ${isDarkMode ? 'bg-indigo-900/50 border-indigo-700 text-slate-300' : 'bg-indigo-50 border-indigo-100 text-slate-600'}`}>
                                <p className={`font-semibold mb-1 ${isDarkMode ? 'text-indigo-400' : 'text-indigo-700'}`}>Quick guide</p>
                                <p>1. Click "Set Start" → Enter [row, col]</p>
                                <p>2. Click "Set Target" → Enter [[row, col], ...]</p>
                                <p>3. Add obstacles if needed</p>
                                <p>4. Click "Optimize Route"</p>
                            </div>
                        </div>

                        <div className={`backdrop-blur p-5 rounded-2xl border shadow-sm lg:col-span-2 ${isDarkMode ? 'bg-slate-800/80 border-slate-700' : 'bg-white/80 border-indigo-100'}`}>
                            <div className="flex flex-wrap gap-2 mb-4">
                                <button onClick={runOptimization} disabled={loading} className="bg-teal-500 text-white px-5 py-2 rounded-full font-bold hover:bg-teal-400 shadow-sm transition disabled:opacity-60">
                                    {loading ? 'CALCULATING...' : 'Optimize Route'}
                                </button>
                                <button onClick={runComparison} disabled={loading} className="bg-violet-500 text-white px-5 py-2 rounded-full font-bold hover:bg-violet-400 shadow-sm transition disabled:opacity-60">
                                    Compare Algorithms
                                </button>
                                <button onClick={verifyAccuracy} disabled={loading} className="bg-amber-500 text-white px-5 py-2 rounded-full font-bold hover:bg-amber-400 shadow-sm transition disabled:opacity-60">
                                    Verify Accuracy
                                </button>
                            </div>

                            {error && <div className={`mb-3 rounded-xl border p-3 ${isDarkMode ? 'text-rose-300 bg-rose-900/50 border-rose-700' : 'text-rose-700 bg-rose-50 border-rose-100'}`}>{error}</div>}

                            <div className="relative inline-block">
                                <svg
                                    width={gridPixelWidth}
                                    height={gridPixelHeight}
                                    className="absolute top-0 left-0 pointer-events-none"
                                >
                                    {animatedPath.length > 1 && (
                                        <polyline
                                            points={routePoints}
                                            fill="none"
                                            stroke="#22d3ee"
                                            strokeWidth="6"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                            opacity="0.9"
                                        />
                                    )}
                                    {activePoint && (
                                        <circle
                                            cx={activePoint[1] * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2}
                                            cy={activePoint[0] * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2}
                                            r="8"
                                            fill="#34d399"
                                        />
                                    )}
                                </svg>

                            <div
                                className="grid gap-2"
                                style={{
                                    gridTemplateColumns: `repeat(${grid[0]?.length || 0}, ${CELL_SIZE}px)`,
                                    gridTemplateRows: `repeat(${grid.length || 0}, ${CELL_SIZE}px)`
                                }}
                            >
                            {grid.map((row, r) => row.map((cell, c) => {
                                const isP = animatedPath.some(pt => pt[0] === r && pt[1] === c);
                                const startCell = isStart(r, c);
                                const targetCell = isTarget(r, c);
                                const activeCell = activePoint && activePoint[0] === r && activePoint[1] === c;
                                const stepNumber = pathIndexMap.get(`${r}-${c}`);
                                return (
                                    <button
                                        key={`${r}-${c}`}
                                        onClick={() => applyCellAction(r, c)}
                                        className={`flex items-center justify-center rounded relative z-10 text-xs font-semibold transition
                                        ${cell===1 ? (isDarkMode ? 'bg-slate-600 text-slate-400' : 'bg-slate-300 text-slate-600') : (isDarkMode ? 'bg-slate-700 text-slate-300' : 'bg-indigo-50 text-indigo-800')} 
                                        ${isP ? (isDarkMode ? 'bg-teal-600 shadow-md' : 'bg-teal-300 shadow-md') : ''}
                                        ${activeCell ? 'ring-2 ring-teal-400 scale-105' : ''} 
                                        ${targetCell ? 'border-2 border-amber-400' : ''} 
                                        ${startCell ? 'ring-2 ring-emerald-500' : ''}`}
                                        style={{ width: `${CELL_SIZE}px`, height: `${CELL_SIZE}px` }}
                                    >
                                        {activeCell ? '🚗' : (cell === 1 ? '🪨' : (startCell ? '🚗' : (targetCell ? '🏠' : (stepNumber || ''))))}
                                    </button>
                                )
                            }))}
                            </div>
                            </div>

                            <div className="mt-4 grid md:grid-cols-3 gap-3 text-sm">
                                <div className={`p-3 rounded-xl border ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-indigo-50 border-indigo-100'}`}>🪨 Obstacle (stone)</div>
                                <div className={`p-3 rounded-xl border ${isDarkMode ? 'bg-emerald-900/50 border-emerald-700' : 'bg-emerald-50 border-emerald-100'}`}>🚗 Start Node (car)</div>
                                <div className={`p-3 rounded-xl border ${isDarkMode ? 'bg-amber-900/50 border-amber-700' : 'bg-amber-50 border-amber-100'}`}>🏠 Target Node (home) | Teal line = moving route</div>
                            </div>

                            {stats && (
                                <div className="mt-5 grid md:grid-cols-3 gap-3">
                                    <div className={`p-3 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-indigo-100'}`}>
                                        <p className={`text-xs ${isDarkMode ? 'text-indigo-400' : 'text-indigo-500'}`}>Total Steps</p>
                                        <p className={`text-xl font-bold ${isDarkMode ? 'text-slate-200' : 'text-slate-800'}`}>{stats.total_steps}</p>
                                    </div>
                                    <div className={`p-3 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-indigo-100'}`}>
                                        <p className={`text-xs ${isDarkMode ? 'text-indigo-400' : 'text-indigo-500'}`}>Target Reached</p>
                                        <p className="text-xl font-bold text-emerald-500">{stats.target_reached ? 'true' : 'false'}</p>
                                    </div>
                                    <div className={`p-3 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-indigo-100'}`}>
                                        <p className={`text-xs ${isDarkMode ? 'text-indigo-400' : 'text-indigo-500'}`}>Execution Time</p>
                                        <p className={`text-xl font-bold ${isDarkMode ? 'text-slate-200' : 'text-slate-800'}`}>{stats.execution_time_ms} ms</p>
                                    </div>
                                </div>
                            )}

                            {comparison.length > 0 && (
                                <div className={`mt-5 p-3 rounded-xl border shadow-sm overflow-auto ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-indigo-100'}`}>
                                    <h3 className={`font-bold mb-2 ${isDarkMode ? 'text-indigo-400' : 'text-indigo-700'}`}>Algorithm Comparison</h3>
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className={`border-b ${isDarkMode ? 'text-indigo-400 border-slate-600' : 'text-indigo-600 border-indigo-100'}`}>
                                                <th className="text-left py-2">Algorithm</th>
                                                <th className="text-left py-2">Steps</th>
                                                <th className="text-left py-2">Compute Time</th>
                                                <th className="text-left py-2">Highlights</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {comparison.map((item) => (
                                                <tr key={item.name} className={`border-b ${isDarkMode ? 'border-slate-600 text-slate-300' : 'border-indigo-50 text-slate-700'}`}>
                                                    <td className="py-2">{item.name}</td>
                                                    <td className="py-2">{item.steps}</td>
                                                    <td className="py-2">{item.compute_time_ms} ms</td>
                                                    <td className="py-2">
                                                        {item.is_shortest && <span className="mr-2 px-2 py-1 rounded bg-emerald-100 text-emerald-700 text-xs">Shortest</span>}
                                                        {item.is_fastest && <span className="px-2 py-1 rounded bg-violet-100 text-violet-700 text-xs">Fastest</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {accuracy && (
                                <div className={`mt-5 p-4 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-indigo-100'}`}>
                                    <h3 className={`font-bold mb-3 text-lg ${isDarkMode ? 'text-amber-400' : 'text-amber-600'}`}>🎯 Algorithm Performance Analysis</h3>
                                    
                                    <div className="grid md:grid-cols-2 gap-4 mb-4">
                                        <div className={`p-4 rounded-lg ${isDarkMode ? 'bg-gradient-to-br from-emerald-900 to-teal-900' : 'bg-gradient-to-br from-emerald-50 to-teal-50'}`}>
                                            <p className={`text-xs font-semibold mb-1 ${isDarkMode ? 'text-emerald-400' : 'text-emerald-600'}`}>CHOSEN ALGORITHM</p>
                                            <h4 className={`text-xl font-bold ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{accuracy.chosen_algorithm}</h4>
                                            <div className="mt-3 flex items-baseline gap-2">
                                                <span className={`text-3xl font-bold ${accuracy.accuracy_percentage >= 95 ? 'text-emerald-500' : 'text-teal-500'}`}>
                                                    {accuracy.accuracy_percentage}%
                                                </span>
                                                <span className={`text-sm ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>Accuracy</span>
                                            </div>
                                            <div className="mt-2">
                                                <span className={`px-3 py-1 rounded-full text-xs font-bold ${accuracy.path_optimality === 'Perfect' ? 'bg-emerald-500 text-white' : accuracy.path_optimality === 'Near-Optimal' ? 'bg-teal-500 text-white' : 'bg-amber-500 text-white'}`}>
                                                    {accuracy.path_optimality}
                                                </span>
                                            </div>
                                        </div>

                                        <div className={`p-4 rounded-lg ${isDarkMode ? 'bg-slate-800' : 'bg-indigo-50'}`}>
                                            <p className={`text-xs font-semibold mb-2 ${isDarkMode ? 'text-indigo-400' : 'text-indigo-600'}`}>PERFORMANCE METRICS</p>
                                            <div className="grid grid-cols-2 gap-2 text-sm">
                                                <div>
                                                    <p className={`text-xs ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Total Steps</p>
                                                    <p className={`text-lg font-bold ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{accuracy.total_steps}</p>
                                                </div>
                                                <div>
                                                    <p className={`text-xs ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Compute Time</p>
                                                    <p className={`text-lg font-bold ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{accuracy.computation_time_ms}ms</p>
                                                </div>
                                                <div>
                                                    <p className={`text-xs ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Theoretical Min</p>
                                                    <p className={`text-lg font-bold ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{accuracy.theoretical_minimum}</p>
                                                </div>
                                                <div>
                                                    <p className={`text-xs ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Efficiency</p>
                                                    <p className={`text-lg font-bold text-emerald-500`}>{accuracy.accuracy_percentage}%</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`p-4 rounded-lg mb-4 ${isDarkMode ? 'bg-indigo-900/50' : 'bg-indigo-50'}`}>
                                        <p className={`text-sm font-bold mb-2 ${isDarkMode ? 'text-indigo-400' : 'text-indigo-700'}`}>💡 Why This Algorithm Was Chosen:</p>
                                        <div className={`text-sm space-y-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>
                                            {accuracy.reasoning.why_chosen.map((reason, idx) => (
                                                <p key={idx}>✓ {reason}</p>
                                            ))}
                                        </div>
                                        <div className={`mt-3 p-3 rounded border text-xs ${isDarkMode ? 'bg-slate-800 border-slate-700 text-slate-400' : 'bg-white border-indigo-200 text-slate-600'}`}>
                                            <strong>Key Advantage:</strong> {accuracy.reasoning.key_advantage}
                                        </div>
                                    </div>

                                    <div className={`p-4 rounded-lg mb-4 ${isDarkMode ? 'bg-slate-800' : 'bg-slate-50'}`}>
                                        <p className={`text-sm font-bold mb-2 ${isDarkMode ? 'text-amber-400' : 'text-amber-600'}`}>📊 Comparative Performance:</p>
                                        <div className={`text-sm space-y-1 ${isDarkMode ? 'text-slate-300' : 'text-slate-700'}`}>
                                            <p>• {accuracy.reasoning.vs_dijkstra}</p>
                                            <p>• {accuracy.reasoning.vs_greedy}</p>
                                        </div>
                                    </div>

                                    <div className={`overflow-auto ${isDarkMode ? 'bg-slate-800' : 'bg-white'} rounded-lg p-3`}>
                                        <p className={`text-sm font-bold mb-2 ${isDarkMode ? 'text-violet-400' : 'text-violet-600'}`}>All Algorithms Tested:</p>
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className={`border-b ${isDarkMode ? 'text-slate-400 border-slate-600' : 'text-slate-600 border-slate-200'}`}>
                                                    <th className="text-left py-2">Algorithm</th>
                                                    <th className="text-left py-2">Steps</th>
                                                    <th className="text-left py-2">Time (ms)</th>
                                                    <th className="text-left py-2">Accuracy</th>
                                                    <th className="text-left py-2">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {accuracy.algorithm_comparison.map((algo, idx) => (
                                                    <tr key={idx} className={`border-b ${isDarkMode ? 'border-slate-700 text-slate-300' : 'border-slate-100 text-slate-700'}`}>
                                                        <td className="py-2 font-semibold">{algo.name}</td>
                                                        <td className="py-2">{algo.steps}</td>
                                                        <td className="py-2">{algo.time_ms}</td>
                                                        <td className="py-2">
                                                            <span className={`font-bold ${algo.accuracy >= 95 ? 'text-emerald-500' : algo.accuracy >= 85 ? 'text-teal-500' : 'text-amber-500'}`}>
                                                                {algo.accuracy}%
                                                            </span>
                                                        </td>
                                                        <td className="py-2">
                                                            {algo.is_best && <span className="px-2 py-1 rounded bg-emerald-500 text-white text-xs font-bold">Best Path</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
