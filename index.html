<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteMaster AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Manrope', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: linear-gradient(120deg, #f4f7ff 0%, #f9f4ff 45%, #eef9f7 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MODES = {
            OBSTACLE: 'obstacle',
            START: 'start',
            TARGET: 'target',
            ERASE: 'erase'
        };

        const CELL_SIZE = 52;
        const CELL_GAP = 8;

        function App() {
            const [rows, setRows] = useState(6);
            const [cols, setCols] = useState(8);
            const [grid, setGrid] = useState(Array.from({ length: 6 }, () => Array(8).fill(0)));
            const [start, setStart] = useState([0, 0]);
            const [targets, setTargets] = useState([[2, 5], [4, 6]]);
            const [mode, setMode] = useState(MODES.OBSTACLE);
            const [path, setPath] = useState([]);
            const [stats, setStats] = useState(null);
            const [comparison, setComparison] = useState([]);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [animatedIndex, setAnimatedIndex] = useState(-1);
            const animationRef = useRef(null);

            const clearAnimation = () => {
                if (animationRef.current) {
                    clearInterval(animationRef.current);
                    animationRef.current = null;
                }
            };

            useEffect(() => {
                return () => clearAnimation();
            }, []);

            const isStart = (r, c) => start[0] === r && start[1] === c;
            const isTarget = (r, c) => targets.some((t) => t[0] === r && t[1] === c);

            const getDefaultTargets = (nextRows, nextCols) => {
                if (nextRows === 1 && nextCols === 1) {
                    return [];
                }
                if (nextRows - 1 === 0 && nextCols - 1 === 0) {
                    if (nextCols > 1) return [[0, 1]];
                    if (nextRows > 1) return [[1, 0]];
                }
                return [[nextRows - 1, nextCols - 1]];
            };

            const createGrid = () => {
                const nextRows = Math.max(1, Math.min(20, Number(rows)));
                const nextCols = Math.max(1, Math.min(20, Number(cols)));
                setRows(nextRows);
                setCols(nextCols);
                setGrid(Array.from({ length: nextRows }, () => Array(nextCols).fill(0)));
                setStart([0, 0]);
                setTargets(getDefaultTargets(nextRows, nextCols));
                clearAnimation();
                setAnimatedIndex(-1);
                setPath([]);
                setStats(null);
                setComparison([]);
                setError('');
            };

            const applyCellAction = (r, c) => {
                setError('');
                clearAnimation();
                setAnimatedIndex(-1);
                setPath([]);

                if (mode === MODES.START) {
                    if (grid[r][c] === 1) return;
                    setStart([r, c]);
                    return;
                }

                if (mode === MODES.TARGET) {
                    if (grid[r][c] === 1 || isStart(r, c)) return;
                    if (isTarget(r, c)) {
                        setTargets((prev) => prev.filter((point) => !(point[0] === r && point[1] === c)));
                    } else {
                        setTargets((prev) => [...prev, [r, c]]);
                    }
                    return;
                }

                setGrid((prevGrid) => {
                    const nextGrid = prevGrid.map((row) => [...row]);

                    if (mode === MODES.OBSTACLE) {
                        if (isStart(r, c)) return nextGrid;
                        if (isTarget(r, c)) {
                            setTargets((prev) => prev.filter((point) => !(point[0] === r && point[1] === c)));
                        }
                        nextGrid[r][c] = 1;
                    }

                    if (mode === MODES.ERASE) {
                        nextGrid[r][c] = 0;
                    }

                    return nextGrid;
                });
            };

            const resetBoard = () => {
                setGrid(Array.from({ length: rows }, () => Array(cols).fill(0)));
                setStart([0, 0]);
                setTargets([]);
                clearAnimation();
                setAnimatedIndex(-1);
                setPath([]);
                setStats(null);
                setComparison([]);
                setError('');
            };

            const buildPayload = () => ({ grid, start, targets });

            const runOptimization = async () => {
                setError('');
                setStats(null);
                setComparison([]);
                clearAnimation();
                setAnimatedIndex(-1);

                if (!targets.length) {
                    setError('Please add at least one target.');
                    return;
                }

                setPath([]);
                setLoading(true);

                try {
                    const res = await fetch('/calculate-route', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(buildPayload())
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Failed to calculate route');
                    }

                    setStats(data);
                    const fullPath = data.path || [];
                    setPath(fullPath);
                    if (!fullPath.length) {
                        return;
                    }

                    setAnimatedIndex(0);
                    let step = 0;
                    animationRef.current = setInterval(() => {
                        step += 1;
                        if (step >= fullPath.length) {
                            setAnimatedIndex(fullPath.length - 1);
                            clearAnimation();
                            return;
                        }
                        setAnimatedIndex(step);
                    }, 180);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const runComparison = async () => {
                setError('');
                setComparison([]);
                clearAnimation();
                setAnimatedIndex(-1);

                if (!targets.length) {
                    setError('Please add at least one target before comparing algorithms.');
                    return;
                }

                setLoading(true);
                try {
                    const res = await fetch('/compare-algorithms', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(buildPayload())
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Comparison failed');
                    }

                    setComparison(data.results || []);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const modeButtonClass = (currentMode) =>
                `px-3 py-2 rounded-xl font-semibold text-sm transition ${mode === currentMode ? 'bg-indigo-500 text-white shadow' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100'}`;

            const animatedPath = animatedIndex >= 0 ? path.slice(0, animatedIndex + 1) : [];
            const activePoint = animatedPath.length ? animatedPath[animatedPath.length - 1] : null;
            const routePoints = animatedPath.map(([r, c]) => {
                const x = c * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2;
                const y = r * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2;
                return `${x},${y}`;
            }).join(' ');
            const pathIndexMap = new Map(animatedPath.map((point, index) => [`${point[0]}-${point[1]}`, index + 1]));
            const gridPixelWidth = cols * CELL_SIZE + (cols - 1) * CELL_GAP;
            const gridPixelHeight = rows * CELL_SIZE + (rows - 1) * CELL_GAP;

            return (
                <div className="p-6 text-slate-800 max-w-7xl mx-auto">
                    <h1 className="text-4xl font-extrabold text-indigo-700 mb-2 text-center">RouteMaster AI - Smart Warehouse Routing</h1>
                    <p className="text-slate-600 mb-6 text-center">Build a custom warehouse map, optimize routes, and compare algorithms live.</p>

                    <div className="grid lg:grid-cols-3 gap-6 items-start">
                        <div className="bg-white/80 backdrop-blur p-5 rounded-2xl border border-indigo-100 shadow-sm">
                            <h2 className="text-lg font-bold text-indigo-700 mb-3">1) Build Scenario</h2>
                            <p className="text-sm text-slate-500 mb-3">Choose a tool and click on cells to design your warehouse map.</p>

                            <div className="grid grid-cols-2 gap-2 mb-3">
                                <div>
                                    <label className="text-sm text-slate-600">Rows</label>
                                    <input type="number" min="1" max="20" value={rows} onChange={(e) => setRows(e.target.value)} className="w-full p-2 rounded-xl bg-white border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                                </div>
                                <div>
                                    <label className="text-sm text-slate-600">Cols</label>
                                    <input type="number" min="1" max="20" value={cols} onChange={(e) => setCols(e.target.value)} className="w-full p-2 rounded-xl bg-white border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                                </div>
                            </div>

                            <button onClick={createGrid} className="w-full mb-3 bg-indigo-100 text-indigo-700 px-3 py-2 rounded-xl font-semibold hover:bg-indigo-200 transition">Create New Grid</button>

                            <div className="grid grid-cols-2 gap-2 mb-3">
                                <button onClick={() => setMode(MODES.OBSTACLE)} className={modeButtonClass(MODES.OBSTACLE)}>Obstacle</button>
                                <button onClick={() => setMode(MODES.ERASE)} className={modeButtonClass(MODES.ERASE)}>Erase</button>
                                <button onClick={() => setMode(MODES.START)} className={modeButtonClass(MODES.START)}>Set Start</button>
                                <button onClick={() => setMode(MODES.TARGET)} className={modeButtonClass(MODES.TARGET)}>Set Target</button>
                            </div>

                            <button onClick={resetBoard} className="w-full mb-2 bg-rose-100 text-rose-700 px-3 py-2 rounded-xl font-semibold hover:bg-rose-200 transition">Reset Board</button>

                            <div className="text-sm text-slate-600 mt-3 space-y-1">
                                <p>Start: [{start[0] + 1}, {start[1] + 1}]</p>
                                <p>Targets: {targets.length}</p>
                                <p>Obstacles: {grid.flat().filter((v) => v === 1).length}</p>
                            </div>

                            <div className="mt-4 p-3 rounded-xl bg-indigo-50 border border-indigo-100 text-xs text-slate-600">
                                <p className="font-semibold text-indigo-700 mb-1">Quick guide</p>
                                <p>1. Set start and targets</p>
                                <p>2. Add obstacles if needed</p>
                                <p>3. Click Optimize Route</p>
                            </div>
                        </div>

                        <div className="bg-white/80 backdrop-blur p-5 rounded-2xl border border-indigo-100 shadow-sm lg:col-span-2">
                            <div className="flex flex-wrap gap-2 mb-4">
                                <button onClick={runOptimization} disabled={loading} className="bg-teal-500 text-white px-5 py-2 rounded-full font-bold hover:bg-teal-400 shadow-sm transition disabled:opacity-60">
                                    {loading ? 'CALCULATING...' : 'Optimize Route'}
                                </button>
                                <button onClick={runComparison} disabled={loading} className="bg-violet-500 text-white px-5 py-2 rounded-full font-bold hover:bg-violet-400 shadow-sm transition disabled:opacity-60">
                                    Compare Algorithms
                                </button>
                            </div>

                            {error && <div className="mb-3 text-rose-700 bg-rose-50 border border-rose-100 rounded-xl p-3">{error}</div>}

                            <div className="relative inline-block">
                                <svg
                                    width={gridPixelWidth}
                                    height={gridPixelHeight}
                                    className="absolute top-0 left-0 pointer-events-none"
                                >
                                    {animatedPath.length > 1 && (
                                        <polyline
                                            points={routePoints}
                                            fill="none"
                                            stroke="#22d3ee"
                                            strokeWidth="6"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                            opacity="0.9"
                                        />
                                    )}
                                    {activePoint && (
                                        <circle
                                            cx={activePoint[1] * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2}
                                            cy={activePoint[0] * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2}
                                            r="8"
                                            fill="#34d399"
                                        />
                                    )}
                                </svg>

                            <div
                                className="grid gap-2"
                                style={{
                                    gridTemplateColumns: `repeat(${grid[0]?.length || 0}, ${CELL_SIZE}px)`,
                                    gridTemplateRows: `repeat(${grid.length || 0}, ${CELL_SIZE}px)`
                                }}
                            >
                            {grid.map((row, r) => row.map((cell, c) => {
                                const isP = animatedPath.some(pt => pt[0] === r && pt[1] === c);
                                const startCell = isStart(r, c);
                                const targetCell = isTarget(r, c);
                                const activeCell = activePoint && activePoint[0] === r && activePoint[1] === c;
                                const stepNumber = pathIndexMap.get(`${r}-${c}`);
                                return (
                                    <button
                                        key={`${r}-${c}`}
                                        onClick={() => applyCellAction(r, c)}
                                        className={`flex items-center justify-center rounded relative z-10 text-xs font-semibold
                                        ${cell===1 ? 'bg-slate-300 text-slate-600' : 'bg-indigo-50 text-indigo-800'} 
                                        ${isP ? 'bg-teal-300 shadow-md' : ''}
                                        ${activeCell ? 'ring-2 ring-teal-400 scale-105' : ''} 
                                        ${targetCell ? 'border-2 border-amber-400' : ''} 
                                        ${startCell ? 'ring-2 ring-emerald-500' : ''}`}
                                        style={{ width: `${CELL_SIZE}px`, height: `${CELL_SIZE}px` }}
                                    >
                                        {activeCell ? '🚗' : (cell === 1 ? '🪨' : (startCell ? '🚗' : (targetCell ? '🏠' : (stepNumber || ''))))}
                                    </button>
                                )
                            }))}
                            </div>
                            </div>

                            <div className="mt-4 grid md:grid-cols-3 gap-3 text-sm">
                                <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100">🪨 Obstacle (stone)</div>
                                <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-100">🚗 Start Node (car)</div>
                                <div className="bg-amber-50 p-3 rounded-xl border border-amber-100">🏠 Target Node (home) | Teal line = moving route</div>
                            </div>

                            {stats && (
                                <div className="mt-5 grid md:grid-cols-4 gap-3">
                                    <div className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                                        <p className="text-indigo-500 text-xs">Optimized Steps</p>
                                        <p className="text-xl font-bold text-slate-800">{stats.total_steps}</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                                        <p className="text-indigo-500 text-xs">Baseline Steps</p>
                                        <p className="text-xl font-bold text-slate-800">{stats.baseline_steps}</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                                        <p className="text-indigo-500 text-xs">Steps Saved</p>
                                        <p className="text-xl font-bold text-emerald-500">{Math.max(0, (stats.baseline_steps || 0) - (stats.total_steps || 0))}</p>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm">
                                        <p className="text-indigo-500 text-xs">Compute Time</p>
                                        <p className="text-xl font-bold text-slate-800">{stats.compute_time_ms} ms</p>
                                    </div>
                                </div>
                            )}

                            {comparison.length > 0 && (
                                <div className="mt-5 bg-white p-3 rounded-xl border border-indigo-100 shadow-sm overflow-auto">
                                    <h3 className="font-bold text-indigo-700 mb-2">Algorithm Comparison</h3>
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="text-indigo-600 border-b border-indigo-100">
                                                <th className="text-left py-2">Algorithm</th>
                                                <th className="text-left py-2">Steps</th>
                                                <th className="text-left py-2">Compute Time</th>
                                                <th className="text-left py-2">Highlights</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {comparison.map((item) => (
                                                <tr key={item.name} className="border-b border-indigo-50 text-slate-700">
                                                    <td className="py-2">{item.name}</td>
                                                    <td className="py-2">{item.steps}</td>
                                                    <td className="py-2">{item.compute_time_ms} ms</td>
                                                    <td className="py-2">
                                                        {item.is_shortest && <span className="mr-2 px-2 py-1 rounded bg-emerald-100 text-emerald-700 text-xs">Shortest</span>}
                                                        {item.is_fastest && <span className="px-2 py-1 rounded bg-violet-100 text-violet-700 text-xs">Fastest</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
